redis:
  host: localhost
  port: 6379
  db: 0
  password: ""

secret: change-this-to-a-random-secret

server:
  port: 8094

serve_static: true

volcengine:
  api_key: "your-volcengine-ark-api-key"

deepseek:
  api_key: "your-deepseek-api-key"
  endpoint: "https://api.deepseek.com"

system:
  general:
    title: "AI 创作平台"
    logo: ""
    backend: "http://localhost:8094"
  site:
    closeregister: true
    closerelay: true
    quota: 0
  common:
    imagestore: true
    promptstore: false

student:
  initial_credit: 10.0
  initial_draws: 50
  csv: "students.csv"

channel:
  - name: deepseek
    type: openai
    endpoint: "https://api.deepseek.com"
    state: true
    priority: 1
    weight: 1
    models:
      - deepseek-v4-flash
      - deepseek-v4-pro
    retry: 0
    secret: ""

market:
  - id: deepseek-v4-flash
    name: "DeepSeek V4 Flash"
    description: "快速推理 · ¥1(入) ¥2(出)/百万token"
    default: true
  - id: deepseek-v4-pro
    name: "DeepSeek V4 Pro"
    description: "高性能推理 · ¥3(入) ¥6(出)/百万token"
    default: false
  - id: seedream-draw
    name: "Seedream 生图"
    description: "AI 文生图 · 消耗生成次数"
    default: false
    tag:
      - image-generation

charge:
  - type: token-billing
    models: [deepseek-v4-flash]
    input: 0.001
    output: 0.002
    anonymous: false
  - type: token-billing
    models: [deepseek-v4-pro]
    input: 0.003
    output: 0.006
    anonymous: false
  - type: non-billing
    models: [seedream-draw]
    anonymous: false
